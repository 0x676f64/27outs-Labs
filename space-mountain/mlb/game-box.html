<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Box - Diamond Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="scripts/mlb-video-matcher.js" defer></script>
    <script src="scripts/game-box.js" defer></script>
    <script src="scripts/boxscore.js" defer></script>

    <style>
    /* =============================================
       CSS VARIABLES & RESET
    ============================================= */
    :root {
        --red: #bf0d3d;
        --navy: #041e42;
        --navy-mid: #0d1a30;

        --light-bg: #f0f4f8;
        --light-surface: #ffffff;
        --light-surface-2: #f7fafc;
        --light-border: #e2e8f0;
        --light-text: #1e293b;
        --light-text-muted: #64748b;
        --light-nav: #041e42;

        --dark-bg: #080c16;
        --dark-surface: #10172a;
        --dark-surface-2: #0d1322;
        --dark-border: #1e2d45;
        --dark-text: #e2e8f0;
        --dark-text-muted: #8098b8;
        --dark-nav: #0d1322;

        --radius: 6px;
        --radius-sm: 4px;
        --radius-lg: 10px;
        --transition: 0.2s ease;
        --font-body: 'Rubik', sans-serif;
        --font-mono: 'DM Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: var(--font-body);
        min-height: 100vh;
        transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* =============================================
       THEME: LIGHT
    ============================================= */
    body.light {
        background: radial-gradient(circle at top center, rgba(191,13,61,0.04) 0%, transparent 60%), var(--light-bg);
        color: var(--light-text);
        --surface: var(--light-surface);
        --surface-2: var(--light-surface-2);
        --border: var(--light-border);
        --text: var(--light-text);
        --text-muted: var(--light-text-muted);
        --nav-bg: #041e42;
        --nav-tx: #e2e8f0;
        --nav-mu: rgba(226,232,240,.65);
        --nav-hover: #ffffff;
        --nav-bd: rgba(4,30,66,.7);
    }

    /* =============================================
       THEME: DARK
    ============================================= */
    body.dark {
        background: radial-gradient(circle at top center, rgba(4,30,66,0.5) 0%, rgba(8,12,22,0.95) 60%), var(--dark-bg);
        color: var(--dark-text);
        --surface: var(--dark-surface);
        --surface-2: var(--dark-surface-2);
        --border: var(--dark-border);
        --text: var(--dark-text);
        --text-muted: var(--dark-text-muted);
        --nav-bg: #151b2e;
        --nav-tx: #e2e8f0;
        --nav-mu: #8098b8;
        --nav-hover: #ffffff;
        --nav-bd: rgba(30,45,69,.8);
    }

    /* =============================================
       NAVIGATION
    ============================================= */
    nav {
        position: sticky;
        top: 0;
        z-index: 200;
        height: 56px;
        background: var(--nav-bg);
        border-bottom: 1px solid var(--nav-bd);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        transition: background 0.3s, border-color 0.3s;
    }

    .nav-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 24px;
        height: 100%;
        display: flex;
        align-items: center;
        gap: 0;
    }

    .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        flex-shrink: 0;
        margin-right: 24px;
        transition: opacity 0.2s;
    }
    .brand:hover { opacity: 0.8; }
    .brand-name {
        font-size: 0.85rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--nav-tx);
        line-height: 1;
    }

    .nav-links {
        display: flex;
        align-items: center;
        gap: 2px;
        flex: 1;
        overflow-x: auto;
        scrollbar-width: none;
    }
    .nav-links::-webkit-scrollbar { display: none; }

    .nav-a {
        font-size: 12px;
        font-weight: 500;
        color: var(--nav-mu);
        text-decoration: none;
        padding: 6px 10px;
        border-radius: 6px;
        white-space: nowrap;
        transition: color 0.2s;
    }
    .nav-a:hover { color: var(--nav-hover); }
    .nav-a.active { color: var(--red); font-weight: 700; }

    .nav-end {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
        margin-left: auto;
    }

    /* tb = theme button — matches default.html exactly */
    .tb {
        display: flex;
        align-items: center;
        gap: 5px;
        background: transparent;
        border: 1px solid var(--nav-bd);
        color: var(--nav-mu);
        font-family: var(--font-body);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.5px;
        padding: 5px 12px;
        border-radius: 99px;
        cursor: pointer;
        transition: color 0.2s, border-color 0.2s;
        white-space: nowrap;
    }
    .tb svg {
        width: 13px; height: 13px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex-shrink: 0;
    }
    .tb:hover { color: var(--red); border-color: rgba(191,13,61,.45); }

    .hide-sm { display: inline; }
    @media (max-width: 700px) {
        .hide-sm { display: none; }
    }

    /* =============================================
       PAGE WRAPPER
    ============================================= */
    .popup-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px 24px 40px;
    }

    @media (max-width: 640px) {
        .popup-container { padding: 12px 12px 32px; }
    }

    /* =============================================
       GAME HEADER
    ============================================= */
    #game-info {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-radius: var(--radius-lg);
        margin-bottom: 12px;
        border: 1px solid var(--border);
        background: var(--surface);
        gap: 8px;
    }

    .team-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        flex: 1;
        min-width: 0;
    }

    .team-logo {
        width: 72px;
        height: 72px;
        object-fit: contain;
    }

    @media (max-width: 480px) {
        .team-logo { width: 48px; height: 48px; }
        #game-info { padding: 12px 10px; }
    }

    .team-record {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        font-family: var(--font-mono);
    }

    .team-score {
        font-size: 40px;
        font-weight: 800;
        color: var(--text);
        min-width: 44px;
        text-align: center;
        font-family: var(--font-mono);
        letter-spacing: -1px;
    }

    @media (max-width: 480px) {
        .team-score { font-size: 28px; }
    }

    .game-center {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        min-width: 100px;
    }

    .game-status {
        text-align: center;
        color: var(--red);
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
    }

    .score-separator {
        font-size: 22px;
        font-weight: 300;
        color: var(--text-muted);
        font-family: var(--font-mono);
    }

    /* =============================================
       LINESCORE
    ============================================= */
    .linescore-wrapper {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        margin-bottom: 12px;
        overflow: hidden;
    }

    .boxscore-scroll {
        overflow-x: auto;
        padding: 16px 16px 8px;
        scrollbar-width: thin;
        scrollbar-color: var(--red) transparent;
    }
    .boxscore-scroll::-webkit-scrollbar { height: 3px; }
    .boxscore-scroll::-webkit-scrollbar-thumb { background: var(--red); border-radius: 2px; }

    .boxscore-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 480px;
    }

    .boxscore-table th {
        padding: 7px 10px;
        font-weight: 600;
        text-align: center;
        font-size: 10px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: var(--text-muted);
        background: var(--surface-2);
        border-bottom: 1px solid var(--nav-bd);
    }

    .boxscore-table td {
        padding: 8px 10px;
        text-align: center;
        font-size: 11px;
        font-family: var(--font-mono);
        border-bottom: 1px solid var(--nav-bd);
        color: var(--text);
    }

    .boxscore-table tbody tr:last-child td { border-bottom: none; }

    .team-name { padding: 4px 8px !important; }

    .box-team-logo {
        width: 25px;
        height: 25px;
        object-fit: contain;
        display: block;
        margin: 0 auto;
    }

    .inning-score {
        font-weight: 600;
        color: var(--text);
    }

    /* R / H / E columns — bold */
    .boxscore-table td:nth-last-child(-n+3) {
        font-weight: 700;
        color: var(--text);
    }
    .boxscore-table th:nth-last-child(-n+3) {
        color: var(--text);
    }

    /* =============================================
       PITCHING DECISIONS
    ============================================= */
    .pitching-decisions {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 24px;
        padding: 10px 20px 14px;
        flex-wrap: wrap;
    }

    .decision-item {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .decision-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--text-muted);
        font-family: var(--font-mono);
    }

    .decision-name {
        font-size: 12px;
        font-weight: 400;
        color: var(--text);
    }

    /* =============================================
       VIDEO BUTTONS
    ============================================= */
    .video-buttons {
        display: flex;
        gap: 10px;
        justify-content: center;
        padding: 12px 16px;
        border-radius: var(--radius-lg);
        margin-bottom: 12px;
        border: 1px solid var(--border);
        background: var(--surface);
    }

    .video-buttons button {
        background: transparent;
        border: 1px solid var(--border);
        padding: 7px 16px;
        border-radius: var(--radius);
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition: all var(--transition);
        color: var(--red);
        font-family: var(--font-body);
        letter-spacing: 0.3px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .video-buttons button:hover {
        background: var(--red);
        color: white;
        border-color: var(--red);
    }

    /* =============================================
       TOP PERFORMERS
    ============================================= */
    .top-performers-case {
        display: none; /* shown by JS when game over */
        flex-direction: row;
        justify-content: center;
        background: var(--surface);
        border-radius: var(--radius-lg);
        margin-bottom: 12px;
        border: 1px solid var(--border);
        overflow: hidden;
    }

    .top-performer-player {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        flex: 1;
        padding: 20px 16px;
        border-right: 1px solid var(--border);
    }
    .top-performer-player:last-child { border-right: none; }

    .performer-image {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        overflow: hidden;
        margin-bottom: 10px;
        border: 2px solid var(--red);
        background: var(--surface-2);
    }
    .performer-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .performer-name {
        font-size: 12px;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 4px;
    }

    .performer-stats {
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
        font-family: var(--font-mono);
    }

    /* =============================================
       GAME TABS NAVIGATION
    ============================================= */
    #game-tabs-container {
        position: sticky;
        top: 56px; /* matches nav height */
        z-index: 100;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        overflow: hidden;
    }

    .game-tabs {
        display: flex;
        overflow-x: auto;
        scrollbar-width: none;
        border-bottom: 2px solid var(--border);
    }
    .game-tabs::-webkit-scrollbar { display: none; }

    .game-tab-btn {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 13px 20px;
        font-family: var(--font-body);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--nav-mu);
        background: transparent;
        border: none;
        border-bottom: 3px solid transparent;
        margin-bottom: -2px;
        cursor: pointer;
        white-space: nowrap;
        transition: color var(--transition), border-color var(--transition);
    }

    .game-tab-btn svg {
        width: 13px;
        height: 13px;
        flex-shrink: 0;
    }

    .game-tab-btn:hover { color: var(--nav-hover); }

    .game-tab-btn.active {
        color: var(--red);
        border-bottom-color: var(--red);
    }

    /* Light mode: navy text; dark mode: muted blue-grey — driven by theme vars */
    body.light .game-tab-btn       { color: var(--nav-tx); }
    body.light .game-tab-btn:hover { color: var(--nav-hover); }
    body.dark  .game-tab-btn       { color: var(--nav-mu); }
    body.dark  .game-tab-btn:hover { color: var(--nav-hover); }

    @media (max-width: 480px) {
        .game-tab-btn {
            padding: 11px 14px;
            font-size: 10px;
            gap: 5px;
        }
    }

    /* =============================================
       TAB PANELS
    ============================================= */
    .tab-panels-wrapper {
        background: var(--surface);
        border: 1px solid var(--border);
        border-top: none;
        border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        overflow: hidden;
    }

    .game-tab-panel {
        display: none;
        padding: 20px;
        animation: tabFadeIn 0.2s ease;
    }

    .game-tab-panel.active { display: block; }

    @keyframes tabFadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
        .game-tab-panel { padding: 14px; }
    }

    /* =============================================
       SECTION DIVIDERS (inside tabs)
    ============================================= */
    .section-divider {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 24px 0 14px;
    }

    .section-divider:first-child { margin-top: 0; }

    .section-divider-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--text-muted);
        white-space: nowrap;
        flex-shrink: 0;
    }

    .section-divider-line {
        flex: 1;
        height: 1px;
        background: var(--border);
    }

    /* =============================================
       STRIKE ZONE SECTION
    ============================================= */
    .strike-zone-section {
        display: flex;
        justify-content: center;
        padding: 8px 0 4px;
    }

    .strike-zone-wrapper {
        width: 100%;
        max-width: 360px;
        text-align: center;
    }

    .strike-zone-title {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 10px;
    }

    .sz-svg { display: block; margin: 0 auto; }

    .strike-zone-label {
        font-size: 10px;
        color: var(--text-muted);
        margin-top: 6px;
        letter-spacing: 0.3px;
    }

    /* =============================================
       PLAYS GRID (scoring + all plays)
    ============================================= */
    .plays-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
    }

    @media (max-width: 720px) {
        .plays-grid { grid-template-columns: 1fr; }
    }

    #scoring-plays-container,
    #all-plays-container {
        max-height: 540px;
        overflow-y: auto;
        padding: 12px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        background: var(--surface-2);
        scrollbar-width: thin;
        scrollbar-color: var(--red) transparent;
    }

    #scoring-plays-container::-webkit-scrollbar,
    #all-plays-container::-webkit-scrollbar { width: 4px; }
    #scoring-plays-container::-webkit-scrollbar-thumb,
    #all-plays-container::-webkit-scrollbar-thumb {
        background: var(--red);
        border-radius: 2px;
    }

    .container-title {
        text-align: center;
        padding: 5px 8px;
        margin-bottom: 10px;
        border-radius: var(--radius-sm);
        font-weight: 700;
        font-size: 10px;
        letter-spacing: 1px;
        text-transform: uppercase;
        background: var(--navy);
        color: white;
    }

    body.dark .container-title { background: #1e2d45; }

    /* =============================================
       PLAY ITEMS
    ============================================= */
    .play-item {
        display: flex;
        align-items: flex-start;
        margin-bottom: 8px;
        padding: 10px;
        border-radius: var(--radius);
        position: relative;
        border: 1px solid var(--border);
        background: var(--surface);
        animation: slideIn 0.25s ease-out forwards;
    }

    @keyframes slideIn {
        from { opacity: 0; transform: translateY(-6px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .inning-indicator {
        position: absolute;
        top: 8px;
        left: 8px;
        background: var(--red);
        color: white;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 9px;
        font-weight: 700;
        text-transform: capitalize;
        font-family: var(--font-mono);
    }

    .player-image-container {
        flex-shrink: 0;
        margin-right: 10px;
        margin-left: 44px;
        position: relative;
    }

    .player-image {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 2px solid var(--red);
        background: var(--navy);
        object-fit: cover;
    }

    .event-icon {
        position: absolute;
        bottom: -3px;
        right: -3px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--red);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 8px;
        color: white;
        border: 2px solid var(--surface);
        font-weight: 800;
    }

    .content-wrapper {
        display: flex;
        flex: 1;
        align-items: flex-start;
        gap: 10px;
    }

    .play-details { flex: 1; margin-top: 2px; }

    .event-name {
        border: 1.5px solid var(--red);
        color: var(--red);
        padding: 2px 7px;
        border-radius: 99px;
        font-weight: 600;
        font-size: 10px;
        display: inline-block;
        margin-bottom: 5px;
    }

    .play-description {
        font-size: 11px;
        line-height: 1.45;
        margin: 0 0 4px 0;
        font-weight: 400;
        color: var(--text);
    }

    .score-update {
        font-weight: 600;
        font-size: 10px;
        color: #3b82f6;
        font-family: var(--font-mono);
    }

    .rbi-info {
        font-weight: 600;
        font-size: 10px;
        color: #10b981;
        font-family: var(--font-mono);
    }

    .statcast-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 6px;
        padding: 6px 0 0;
        border-top: 1px solid var(--border);
    }

    .stat-item {
        text-align: center;
        font-size: 9px;
    }

    .stat-item div:first-child {
        font-size: 8px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        margin-bottom: 2px;
    }

    .stat-item div:last-child {
        font-size: 11px;
        font-weight: 700;
        color: var(--red);
        font-family: var(--font-mono);
    }

    .game-situation {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 6px;
        border-radius: var(--radius-sm);
        background: var(--surface-2);
        border: 1px solid var(--border);
        min-width: 62px;
    }

    .count-info {
        font-size: 10px;
        font-weight: 700;
        color: var(--red);
        text-align: center;
        font-family: var(--font-mono);
        margin-bottom: 2px;
    }

    .video-button {
        position: absolute;
        bottom: 8px;
        right: 8px;
        border: 1px solid var(--border);
        padding: 3px 9px;
        border-radius: var(--radius-sm);
        font-size: 8px;
        font-weight: 700;
        cursor: pointer;
        transition: all var(--transition);
        background: var(--surface);
        color: var(--red);
        letter-spacing: 0.5px;
        font-family: var(--font-body);
    }

    .video-button:hover {
        background: var(--red);
        color: white;
        border-color: var(--red);
    }

    /* =============================================
       SCOREBUG
    ============================================= */
    #scorebug-wrapper {
        display: none;
        margin-bottom: 12px;
    }

    .scorebug {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        justify-content: center;
    }

    .balls-strikes {
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        font-family: var(--font-mono);
    }

    /* =============================================
       WIN PROBABILITY TAB
    ============================================= */
    #win-prob-container {
        padding: 0;
    }

    .wp-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px;

    @keyframes spin {

        to { transform: rotate(360deg); }
    }

    /* =============================================
       BOXSCORE TAB (batting/pitching stats)
    ============================================= */
    .stats-section-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--text-muted);
        padding: 12px 0 8px;
        border-bottom: 2px solid var(--red);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .stats-section-title img {
        width: 20px;
        height: 20px;
        object-fit: contain;
    }

    .stats-table-wrapper {
        margin-bottom: 20px;
        overflow-x: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--red) transparent;
    }
    .stats-table-wrapper::-webkit-scrollbar { height: 3px; }
    .stats-table-wrapper::-webkit-scrollbar-thumb { background: var(--red); }

    .stats-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 400px;
    }

    .stats-table th {
        padding: 7px 10px;
        text-align: left;
        font-weight: 600;
        font-size: 9px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: var(--text-muted);
        background: var(--surface-2);
        border-bottom: 1px solid var(--nav-bd);
        white-space: nowrap;
    }

    .stats-table td {
        padding: 7px 10px;
        border-bottom: 1px solid var(--nav-bd);
        font-size: 11px;
        color: var(--text);
        white-space: nowrap;
    }

    .stats-table tbody tr:last-child td { border-bottom: none; }

    .stats-table tbody tr:hover {
        background: rgba(191, 13, 61, 0.04);
    }

    .player-col {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .player-col img {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1.5px solid var(--red);
        object-fit: cover;
        flex-shrink: 0;
    }

    .player-col .player-info {
        display: flex;
        flex-direction: column;
    }

    .player-col .player-name {
        font-size: 11px;
        font-weight: 600;
        color: var(--text);
    }

    .player-col .player-position {
        font-size: 9px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-family: var(--font-mono);
    }

    /* Desktop boxscore: side by side, hidden on mobile */
    .desktop-boxscore {
        display: flex;
        gap: 20px;
    }
    .team-column { flex: 1; min-width: 0; }

    /* Mobile boxscore: tabbed, hidden on desktop */
    .mobile-boxscore { display: none; }

    @media (max-width: 820px) {
        .desktop-boxscore { display: none; }
        .mobile-boxscore  { display: block; }
    }

    /* Mobile boxscore tab navigation */
    .tab-navigation {
        display: flex;
        border-radius: var(--radius) var(--radius) 0 0;
        overflow: hidden;
        border: 1px solid var(--border);
        border-bottom: none;
        margin-bottom: 0;
    }

    .tab-navigation button {
        flex: 1;
        padding: 9px 9px 7px;
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        font-weight: 600;
        cursor: pointer;
        font-size: 11px;
        color: var(--text-muted);
        font-family: var(--font-body);
        position: relative;
        transition: color .22s ease, border-color .22s ease;
    }

    .tab-navigation button::after {
        content: '';
        position: absolute;
        bottom: -1px;
        left: 50%;
        width: 0;
        height: 2px;
        background: var(--red);
        border-radius: 99px;
        transform: translateX(-50%);
        transition: width .28s cubic-bezier(.25,.46,.45,.94);
    }

    .tab-navigation button.active {
        color: #fff;
        border-bottom-color: transparent;
    }

    .tab-navigation button.active::after {
        width: 60%;
    }

    .tab-content {
        display: none;
        padding: 14px;
        border-radius: 0 0 var(--radius) var(--radius);
        border: 1px solid var(--border);
        background: var(--surface-2);
    }

    .tab-content.active { display: block; }

    /* =============================================
       MISC / UTILITIES
    ============================================= */
    .loading, .no-data, .error {
        text-align: center;
        padding: 20px;
        font-size: 12px;
        color: var(--text-muted);
    }

    .error { color: #ef4444; }

    /* Mobile: hide nav on tab overflow */
    @media (max-width: 480px) {
        .game-tab-btn span.tab-label { display: none; }
        /* Only show icon + abbreviated label */
    }

    /* =============================================
       RESPONSIVE: PLAYS GRID STACKING
    ============================================= */
    @media (max-width: 640px) {
        .player-image-container { margin-left: 38px; }
        .player-image { width: 36px; height: 36px; }
        .game-situation { min-width: 52px; }
        .game-situation svg { width: 46px; height: 46px; }
    }
    
    /* ── LIGHT MODE: NAVY HEADER ACCENTS ── */
    body.light .section-title,
    body.light .tab-label,
    body.light .overview-label,
    body.light .stat-label,
    body.light .box-header,
    body.light .inning-header { color: #041e42; opacity: 0.75; }

    body.light .tab-navigation { background: #0d2244; border-color: rgba(4,30,66,.5); }
    body.light .tab-navigation button { color: rgba(226,232,240,.6); }
    body.light .tab-navigation button:hover { color: #e2e8f0; }
    body.light .tab-navigation button.active { color: var(--red); }


/* Strike zone is transparent — uses card surface color naturally */

    #live-at-bat {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);

        overflow: hidden;
    }

    /* ── Header ── */
    .lab-header {
        display: flex;
        align-items: center;
        justify-content: space-between;

        border-bottom: 1px solid var(--border);
        gap: 12px;
        flex-wrap: wrap;

    .lab-context {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
    }

    .lab-inning {
        font-family: var(--font-mono);
        font-size: 13px;
        font-weight: 700;
        color: var(--red);
        letter-spacing: 0.5px;
    }

    .lab-outs {
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .lab-out-dot {
        width: 9px; height: 9px;
        border-radius: 50%;
        border: 1.5px solid var(--red);
        background: transparent;
        transition: background .2s;
    }

    .lab-outs-lbl {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-muted);
        margin-left: 2px;
    }

    .lab-players {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
        min-width: 0;
    }

    .lab-batter-info {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
    }

    .lab-headshot {
        width: 40px; height: 40px;
        border-radius: 50%;
        border: 2px solid var(--red);
        object-fit: cover;
        flex-shrink: 0;
        background: var(--surface-2);
    }

    .lab-batter-name {
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 180px;
    }

    .lab-batter-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 3px;
        flex-wrap: wrap;
    }

    .lab-hand-badge {
        font-family: var(--font-mono);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 1px;
        padding: 2px 6px;
        border-radius: 4px;
        background: rgba(4,30,66,0.8);
        color: #e2e8f0;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .cab-stat {
        display: flex;
        align-items: center;
        gap: 4px;
    }

    .cab-lbl {
        font-family: var(--font-mono);
        font-size: 8px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
    }

    .cab-val {
        font-family: var(--font-mono);
        font-size: 12px;
        font-weight: 700;
    }

    .lab-vs {
        font-family: var(--font-mono);
        font-size: 9px;
        color: var(--text-muted);
        flex-shrink: 0;
    }

    .lab-pitcher-mini {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 140px;
    }

    /* Base runner diamond — pushed to far right of header */
    .lab-runners {
        margin-left: auto;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        padding-left: 12px;
    }

    .lab-runners-svg {
        display: block;
        width: 58px;
        height: 58px;
        /* Occupied bases glow slightly */
        filter: drop-shadow(0 0 3px rgba(191,13,61,0.3));
    }

    /* ── Body: zone col + right col ── */
    .lab-body {
        display: flex;
        flex-direction: row;
        gap: 0;
    }

    @media (max-width: 820px) {
        .lab-body { flex-direction: column; }
    }

    /* ── Zone column ── */
    .lab-zone-col {
        padding: 16px 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        border-right: 1px solid var(--border);
        /* Fixed width — never stretches regardless of layout state */
        width: 230px;
        flex-shrink: 0;
        box-sizing: border-box;
    }

    @media (max-width: 820px) {
        .lab-zone-col { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 16px; }
        .lab-zone-wrap { margin: 0 auto; }
    }

    /* Zone wrap: fixed px — never percentage, renders correctly on first paint */
    /* Zone wrap: fixed px — batter sits outside, overlapping slightly */
    .lab-zone-wrap {
        position: relative;
        width: 68px;
        height: 165px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
    }

    /* Batter silhouette — positioned OUTSIDE the zone box, no overflow issues */
    .lab-batter-silhouette {
        position: absolute;
        top: -12px;
        width: 56px;
        height: 165px;
        pointer-events: none;
        opacity: 0.82;
        overflow: visible;
    }

    /* Catcher/ump POV: RHB on LEFT (3B side), LHB on RIGHT (1B side) */
    .lab-batter-silhouette.rhb { right: 100%; margin-right: 6px; }
    .lab-batter-silhouette.lhb { left: 100%; margin-left: 6px; }

    .batter-svg {
        display: block;
        width: 52px !important;
        height: 150px !important;
    }

    /* Zone SVG container — exactly matches SVG attributes */
    .lab-zone-svg {
        width: 68px;
        height: 90px;
        flex-shrink: 0;
        display: block;
    }

    .lab-zone-svg .sz-svg {
        display: block;
        width: 68px !important;
        height: 90px !important;
    }

    /* ── Count pills ── */
    .lab-count {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 14px;
    }

    .count-group {
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .count-dot {
        width: 11px; height: 11px;
        border-radius: 50%;
        border: 2px solid;
        transition: background .2s, transform .15s;
    }

    .ball-dot   { border-color: #10b981; background: transparent; }
    .ball-dot.on { background: #10b981; transform: scale(1.15); }
    .strike-dot  { border-color: #ef4444; background: transparent; }
    .strike-dot.on { background: #ef4444; transform: scale(1.15); }

    .count-lbl {
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 700;
        color: var(--text-muted);
        margin-left: 2px;
    }

    .count-divider {
        width: 1px; height: 20px;
        background: var(--border);
    }

    /* ── Last pitch desc + result ── */
    .lab-last-desc {
        font-size: 12px;
        line-height: 1.5;

        text-align: center;
        max-width: 340px;
        padding: 0 8px;

    .lab-result-event {

        overflow: hidden;
        flex: 1;

    .lab-pitchlog-title {

            <span class="team-score away-score">0</span>

            <div class="game-center">
                <div class="game-status">—</div>
            </div>

            <span class="team-score home-score">0</span>

            <div class="team-container">
                <img class="team-logo home-logo" src="" alt="Home Team">
                <span class="team-record home-record"></span>
            </div>
        </div>

        <!-- ========================
             LINESCORE
        ======================== -->
        <div class="linescore-wrapper">
            <div class="boxscore-scroll">
                <table class="boxscore-table">
                    <thead>
                        <tr>
                            <th>Team</th>
                            <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
                            <th>6</th><th>7</th><th>8</th><th>9</th>
                            <th>R</th><th>H</th><th>E</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Populated by JS -->
                        <tr>
                            <td class="team-name"></td>
                            <td class="inning-score">-</td><td class="inning-score">-</td>
                            <td class="inning-score">-</td><td class="inning-score">-</td>
                            <td class="inning-score">-</td><td class="inning-score">-</td>
                            <td class="inning-score">-</td><td class="inning-score">-</td>
                            <td class="inning-score">-</td>
                            <td>-</td><td>-</td><td>-</td>
                        </tr>
                        <tr>
                            <td class="team-name"></td>
                            <td class="inning-score">-</td><td class="inning-score">-</td>
                            <td class="inning-score">-</td><td class="inning-score">-</td>
                            <td class="inning-score">-</td><td class="inning-score">-</td>
                            <td class="inning-score">-</td><td class="inning-score">-</td>
                            <td class="inning-score">-</td>
                            <td>-</td><td>-</td><td>-</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Pitching decisions injected here by JS -->
        </div>

        <!-- ========================
             SCOREBUG (live only)
        ======================== -->
        <div id="scorebug-wrapper">
            <div id="scorebug-container"></div>
        </div>

        <!-- ========================
             VIDEO BUTTONS (final only)
        ======================== -->
        <div class="video-buttons" style="display:none;">
            <button data-video-type="condensed">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                Condensed Game
            </button>
            <button data-video-type="recap">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
                Game Recap
            </button>
        </div>

        <!-- ========================
             TOP PERFORMERS (final only)
        ======================== -->
        <div class="top-performers-case">
            <!-- Populated by JS -->
        </div>

        <!-- ========================
             TAB SYSTEM
        ======================== -->
        <div id="game-tabs-container">
            <!-- Tab nav injected by JS -->
        </div>

        <div class="tab-panels-wrapper">

            <!-- ── OVERVIEW TAB ── -->
            <div id="game-overview-tab" class="game-tab-panel active">

                <!-- LIVE AT-BAT MODULE — shown only during live games -->
                <div id="live-at-bat" style="display:none"></div>

                <!-- Scoring Plays -->
                <div class="section-divider">
                    <span class="section-divider-label">Scoring Plays</span>
                    <span class="section-divider-line"></span>
                </div>

                <!-- All Plays + Scoring side by side -->
                <div class="plays-grid">
                    <div id="scoring-plays-container">
                        <div class="container-title">Scoring Plays</div>
                    </div>
                    <div id="all-plays-container">
                        <div class="container-title">All Plays</div>
                    </div>
                </div>

            </div><!-- /overview tab -->

            <!-- ── BOX SCORE TAB ── -->
            <div id="boxscore-tab" class="game-tab-panel">
                <div id="boxscore-container">
                    <!-- Populated by boxscore.js -->
                </div>
            </div>

            <!-- ── WIN PROB TAB ── -->
            <div id="win-prob-tab" class="game-tab-panel">
                <div id="win-prob-container">
                    <div class="wp-loading">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                        </svg>
                        Loading win probability…
                    </div>
                </div>
            </div>

        </div><!-- /tab-panels-wrapper -->

    </div><!-- /popup-container -->

    <script>
    // =============================================
    // INLINE TAB BOOT — runs before game-box.js
    // to wire up tab switching and render nav
    // =============================================
    (function() {
        // Will be called by game-box.js after data loads, but
        // we define the renderer here so it's available globally.

        window.renderGameTabs = function(phase) {
            const container = document.getElementById('game-tabs-container');
            if (!container) return;

            const isPregame = phase === 'PREGAME';

            // Overview is hidden in pregame; boxscore becomes the first/active tab
            const allTabs = [
                {
                    id: 'game-overview',
                    label: 'Overview',
                    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>`,
                    hidden: isPregame
                },
                {
                    id: 'boxscore',
                    label: 'Box Score',
                    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19v-6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2zm0 0V9a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v10m-6 0a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2m0 0V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2z"/></svg>`
                }
            ];

            if (!isPregame) {
                allTabs.push({
                    id: 'win-prob',
                    label: 'Win Prob',
                    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`
                });
            }

            // Visible tabs only; first visible tab is active
            const tabs = allTabs.filter(t => !t.hidden);

            container.innerHTML = `
                <nav class="game-tabs" role="tablist">
                    ${tabs.map((t, i) => `
                        <button class="game-tab-btn${i === 0 ? ' active' : ''}"
                                data-tab="${t.id}"
                                role="tab"
                                aria-selected="${i === 0}">
                            ${t.icon}
                            ${t.label}
                        </button>
                    `).join('')}
                </nav>
            `;

            // Sync panels: activate the first visible tab's panel, hide overview panel in pregame
            document.querySelectorAll('.game-tab-panel').forEach(p => p.classList.remove('active'));
            if (isPregame) {
                const overviewPanel = document.getElementById('game-overview-tab');
                if (overviewPanel) overviewPanel.style.display = 'none';
                const boxscorePanel = document.getElementById('boxscore-tab');
                if (boxscorePanel) boxscorePanel.classList.add('active');
            } else {
                const overviewPanel = document.getElementById('game-overview-tab');
                if (overviewPanel) { overviewPanel.style.display = ''; overviewPanel.classList.add('active'); }
            }

            container.querySelectorAll('.game-tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabId = btn.dataset.tab;

                    // Update buttons
                    container.querySelectorAll('.game-tab-btn').forEach(b => {
                        b.classList.toggle('active', b.dataset.tab === tabId);
                        b.setAttribute('aria-selected', b.dataset.tab === tabId);
                    });

                    // Update panels
                    document.querySelectorAll('.game-tab-panel').forEach(p => {
                        p.classList.toggle('active', p.id === `${tabId}-tab`);
                    });

                    // Re-render live at-bat when returning to overview — fixes SVG sizing
                    // on hidden elements that couldn't calculate width correctly
                    if (tabId === 'game-overview' && window._gameDataCache) {
                        const lab = document.getElementById('live-at-bat');
                        if (lab && lab.style.display !== 'none') {
                            // Small delay lets the panel become visible before render
                            requestAnimationFrame(() => {
                                if (typeof renderLiveAtBat === 'function') {
                                    renderLiveAtBat(window._gameDataCache);
                                }
                            });
                        }
                    }

                    // Lazy-load win prob
                    if (tabId === 'win-prob' && window._gameDataCache && window._gamePkCache) {
                        window.loadWinProbabilityTab(window._gamePkCache, window._gameDataCache);
                    }
                });
            });
        };

        // Win prob loader — called lazily on tab click
        window.loadWinProbabilityTab = async function(pk, cachedData) {
            const container = document.getElementById('win-prob-container');
            if (!container || container.dataset.loaded === 'true') return;
            container.dataset.loaded = 'true';

            const MLB_TEAM_COLORS = {
                108:'#BA0021',109:'#A71930',110:'#DF4601',111:'#BD3039',
                112:'#0E3386',113:'#C6011F',114:'#00385D',115:'#333366',
                116:'#0C2340',117:'#EB6E1F',118:'#004687',119:'#005A9C',
                120:'#AB0003',121:'#002D72',133:'#003831',134:'#FDB827',
                135:'#2F241D',136:'#005C5C',137:'#FD5A1E',138:'#C41E3A',
                139:'#092C5C',140:'#003278',141:'#134A8E',142:'#002B5C',
                143:'#E81828',144:'#CE1141',145:'#27251F',146:'#00A3E0',
                147:'#0C2340',158:'#12284B'
            };

            const getColor = id => MLB_TEAM_COLORS[id] || '#041e42';

            container.innerHTML = `
                <div class="wp-loading">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                    </svg>
                    Loading win probability…
                </div>
            `;

            try {
                const wpRes = await fetch(`https://statsapi.mlb.com/api/v1/game/${pk}/winProbability`);
                const wpData = await wpRes.json();

                const gd = cachedData.gameData;
                const awayTeam = gd.teams.away;
                const homeTeam = gd.teams.home;
                const awayId = awayTeam.id, homeId = homeTeam.id;
                const awayColor = getColor(awayId), homeColor = getColor(homeId);
                const awayName = awayTeam.name, homeName = homeTeam.name;
                const awayAbbr = awayTeam.abbreviation, homeAbbr = homeTeam.abbreviation;

                if (!wpData || !wpData.length) {
                    container.innerHTML = `<div class="no-data">Win probability data not available for this game.</div>`;
                    return;
                }

                const latest = wpData[wpData.length - 1];
                const homeProb = Math.round(latest.homeTeamWinProbability);
                const awayProb = Math.round(latest.awayTeamWinProbability);

                const W=520,H=200,PL=36,PR=16,PT=16,PB=28;
                const CW=W-PL-PR, CH=H-PT-PB;
                const total=wpData.length;
                const stepX=CW/(total-1||1);

                const pts = wpData.map((d,i) => ({
                    x: PL+i*stepX,
                    y: PT+(CH/2)+((d.homeTeamWinProbability-50)/50)*(CH/2),
                    homeProb: d.homeTeamWinProbability,
                    awayProb: d.awayTeamWinProbability,
                    added: d.homeTeamWinProbabilityAdded,
                    event: d.result?.event||'',
                    description: d.result?.description||'',
                    inning: d.about?.inning||'',
                    isTop: d.about?.isTopInning
                }));

                const linePoints = pts.map(p=>`${p.x},${p.y}`).join(' ');
                const midY = PT+CH/2;
                const poly = [`${PL},${midY}`, ...pts.map(p=>`${p.x},${p.y}`), `${PL+CW},${midY}`].join(' ');

                const isDark = document.body.classList.contains('dark');
                const inningColor     = isDark ? '#e2e8f0' : '#041e42';
                const inningGridColor = isDark ? 'rgba(226,232,240,0.1)' : 'rgba(4,30,66,0.12)';

                let inningLines='';
                let lastI=0;
                pts.forEach(p=>{
                    if(p.inning && p.inning!==lastI && p.isTop){
                        lastI=p.inning;
                        const x=p.x;
                        inningLines+=`
                            <line x1="${x}" y1="${PT}" x2="${x}" y2="${PT+CH}" stroke="${inningGridColor}" stroke-width="1" stroke-dasharray="3,3"/>
                            <line x1="${x}" y1="${PT+CH}" x2="${x}" y2="${PT+CH+5}" stroke="${inningColor}" stroke-width="1"/>
                            <text x="${x}" y="${PT+CH+15}" text-anchor="middle" font-size="8" fill="${inningColor}" font-family="DM Mono">${p.inning}</text>
                        `;
                    }
                });

                const ttId = `wp-tt-${pk}`;

                const logoBase = 'https://www.mlbstatic.com/team-logos';

                container.innerHTML = `
                    <style>
                    #${ttId}{position:absolute;background:#041e42;color:#fff;padding:8px 10px;border-radius:8px;font-size:11px;font-family:'Rubik',sans-serif;pointer-events:none;display:none;max-width:200px;line-height:1.5;z-index:200;border-left:3px solid #bf0d3d;box-shadow:0 4px 12px rgba(0,0,0,.35);}
                    #${ttId} .tte{font-weight:700;font-size:12px;color:#bf0d3d;margin-bottom:2px;}
                    #${ttId} .ttd{color:#ccc;font-size:10px;margin-bottom:4px;}
                    #${ttId} .ttp{display:flex;justify-content:space-between;gap:10px;margin-top:4px;border-top:1px solid rgba(255,255,255,.15);padding-top:4px;}
                    #${ttId} .tta{color:${awayColor};font-weight:700;filter:brightness(1.8);}
                    #${ttId} .tth{color:${homeColor};font-weight:700;filter:brightness(1.8);}
                    .wp-pos{color:#4caf50;font-size:10px;}
                    .wp-neg{color:#ff6b6b;font-size:10px;}
                    /* =============================================
       LIVE AT-BAT MODULE
    ============================================= */
                    </style>

                    <div style="text-align:center;font-weight:700;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-family:'Rubik',sans-serif;">Win Probability</div>

                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:0 4px;">
                        <div style="display:flex;align-items:center;gap:7px;">
                            <img src="${logoBase}/${awayId}.svg" style="width:22px;height:22px;">
                            <span style="font-size:22px;font-weight:800;color:var(--text);font-family:'DM Mono',monospace;">${awayProb}%</span>
                        </div>
                        <div style="font-size:9px;color:var(--text-muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;">Win Probability</div>
                        <div style="display:flex;align-items:center;gap:7px;">
                            <span style="font-size:22px;font-weight:800;color:#bf0d3d;font-family:'DM Mono',monospace;">${homeProb}%</span>
                            <img src="${logoBase}/${homeId}.svg" style="width:22px;height:22px;">
                        </div>
                    </div>

                    <div style="display:flex;height:5px;border-radius:3px;overflow:hidden;margin:0 4px 12px;">
                        <div style="width:${awayProb}%;background:${awayColor};transition:width .4s;"></div>
                        <div style="width:${homeProb}%;background:${homeColor};transition:width .4s;"></div>
                    </div>

                    <div style="position:relative;width:100%;">
                        <div id="${ttId}"></div>
                        <svg id="wp-svg-${pk}" width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible;display:block;">
                            <rect x="${PL}" y="${PT}" width="${CW}" height="${CH}" fill="var(--surface-2)" rx="4"/>
                            <polygon points="${poly}" fill="${awayColor}" clip-path="url(#ct-${pk})"/>
                            <polygon points="${poly}" fill="${homeColor}" clip-path="url(#cb-${pk})"/>
                            <defs>
                                <clipPath id="ct-${pk}"><rect x="${PL}" y="${PT}" width="${CW}" height="${CH/2}"/></clipPath>
                                <clipPath id="cb-${pk}"><rect x="${PL}" y="${PT+CH/2}" width="${CW}" height="${CH/2}"/></clipPath>
                            </defs>
                            <line x1="${PL}" y1="${PT+CH/2}" x2="${PL+CW}" y2="${PT+CH/2}" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
                            <text x="${PL-4}" y="${PT+CH/2+4}" text-anchor="end" font-size="8" fill="#999" font-family="DM Mono">50%</text>
                            <text x="${PL-4}" y="${PT+5}" text-anchor="end" font-size="8" fill="${awayColor}" font-family="DM Mono">${awayAbbr}</text>
                            <text x="${PL-4}" y="${PT+CH+4}" text-anchor="end" font-size="8" fill="${homeColor}" font-family="DM Mono">${homeAbbr}</text>
                            <text x="${PL-4}" y="${PT+14}" text-anchor="end" font-size="7" fill="#999" font-family="DM Mono">100%</text>
                            <text x="${PL-4}" y="${PT+CH-2}" text-anchor="end" font-size="7" fill="#999" font-family="DM Mono">100%</text>
                            ${inningLines}
                            <polyline points="${linePoints}" fill="none" stroke="${isDark ? 'rgba(226,232,240,1)' : 'rgba(4,30,66,1)'}" stroke-width="1.1" stroke-linejoin="round"/>
                            ${pts.map((p,i)=>{
                                const x = i===0 ? PL : pts[i-1].x+(p.x-pts[i-1].x)/2;
                                const nx = i===pts.length-1 ? PL+CW : p.x+(pts[i+1].x-p.x)/2;
                                const w = nx-x;
                                const ac = p.added>=0?'wp-pos':'wp-neg';
                                const as_ = p.added>=0?'+':'';
                                const sd=(p.description||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
                                const se=(p.event||'').replace(/'/g,"\\'");
                                const il=p.inning?`${p.isTop?'Top':'Bot'} ${p.inning}`:'';
                                return `<rect x="${x}" y="${PT}" width="${w}" height="${CH}" fill="transparent" class="wp-hz"
                                    data-x="${p.x}" data-y="${p.y}"
                                    data-home="${p.homeProb.toFixed(1)}" data-away="${p.awayProb.toFixed(1)}"
                                    data-added="${p.added!==undefined?p.added.toFixed(1):'N/A'}"
                                    data-ac="${ac}" data-as="${as_}"
                                    data-event="${se}" data-desc="${sd}" data-inning="${il}"
                                    style="cursor:crosshair;"/>`;
                            }).join('')}
                            <circle id="wp-dot-${pk}" cx="0" cy="0" r="2.5" fill="white" stroke="${isDark ? 'rgba(226,232,240,1)' : 'rgba(4,30,66,1)'}" stroke-width="1.3" style="display:none;pointer-events:none;"/>
                            <text x="${PL+CW/2}" y="${H-2}" text-anchor="middle" font-size="9" fill="#041e42" font-family="DM Mono">Inning</text>
                        </svg>
                    </div>

                    <div style="display:flex;justify-content:center;gap:18px;margin-top:8px;font-size:11px;font-family:'Rubik',sans-serif;">
                        <div style="display:flex;align-items:center;gap:5px;"><div style="width:14px;height:4px;background:${awayColor};border-radius:2px;"></div>${awayName}</div>
                        <div style="display:flex;align-items:center;gap:5px;"><div style="width:14px;height:4px;background:${homeColor};border-radius:2px;"></div>${homeName}</div>
                    </div>
                `;

                // Hover interactions
                const svg = document.getElementById(`wp-svg-${pk}`);
                const tt = document.getElementById(ttId);
                const dot = document.getElementById(`wp-dot-${pk}`);
                const wrap = svg.parentElement;

                svg.querySelectorAll('.wp-hz').forEach(z=>{
                    z.addEventListener('mouseenter',()=>{
                        dot.setAttribute('cx', z.dataset.x);
                        dot.setAttribute('cy', z.dataset.y);
                        dot.style.display='block';
                        const addedLine = z.dataset.added!=='N/A'
                            ? `<span class="${z.dataset.ac}">${z.dataset.as}${z.dataset.added}% WP shift</span>`
                            : '';
                        tt.innerHTML=`
                            ${z.dataset.inning?`<div style="font-size:9px;color:#888;margin-bottom:2px;">${z.dataset.inning}</div>`:''}
                            ${z.dataset.event?`<div class="tte">${z.dataset.event}</div>`:''}
                            ${z.dataset.desc?`<div class="ttd">${z.dataset.desc}</div>`:''}
                            ${addedLine}
                            <div class="ttp">
                                <span class="tta">${awayAbbr} ${z.dataset.away}%</span>
                                <span class="tth">${homeAbbr} ${z.dataset.home}%</span>
                            </div>
                        `;
                        tt.style.display='block';
                    });
                    z.addEventListener('mousemove',(e)=>{
                        const r=wrap.getBoundingClientRect();
                        let l=e.clientX-r.left+12, t=e.clientY-r.top-10;
                        if(l+200>r.width) l=e.clientX-r.left-212;
                        if(t<0) t=0;
                        tt.style.left=`${l}px`;
                        tt.style.top=`${t}px`;
                    });
                    z.addEventListener('mouseleave',()=>{
                        tt.style.display='none';
                        dot.style.display='none';
                    });
                });

            } catch(err) {
                console.error('Win prob error:', err);
                container.innerHTML = `<div class="no-data">Could not load win probability data.</div>`;
            }
        };

    })();
    </script>

</body>
</html>
