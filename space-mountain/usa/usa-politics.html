<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Politics | XLabs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <div class="logo">
                <img src="/assets/site-logos/logo-light.svg" alt="27 Outs Logo">
            </div>
            <ul class="nav-menu">
                <li><a href="#" class="nav-link active">Dashboard</a></li>
                <li><a href="elections.html" class="nav-link">Elections</a></li>
                <li><a href="congress.html" class="nav-link">Congress</a></li>
                <li><a href="politicians.html" class="nav-link">Politicians</a></li>
                <button class="theme-toggle" onclick="toggleTheme()">
                    <span class="theme-icon">☀️</span> Light
                </button>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <!-- Map Toggle -->
        <div class="map-toggle-container">
            <div class="map-toggle">
                <button class="toggle-btn active" data-view="states">States</button>
                <button class="toggle-btn" data-view="districts">Districts</button>
                <div class="toggle-slider"></div>
            </div>
        </div>

        <!-- States Map View -->
        <div id="states-view" class="map-view active">
            <div class="dashboard">
                <div class="map-container">
                    <div class="map-wrapper" id="states-map-container">
                        <div id="back-to-states"></div>
                        <svg id="us-map" viewBox="0 0 960 600">
                            <!-- US States Map SVG will be inserted here -->
                            <g id="states">
                                <!-- State paths will be dynamically added -->
                            </g>
                        </svg>
                    </div>
                </div>

                <div class="info-panel">
                    <div id="state-info" class="state-info">
                        <div class="no-selection">
                            Select a state to view details
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Districts Map View -->
        <div id="districts-view" class="map-view">
            <div class="dashboard">
                <div class="map-container">
                    <div class="map-wrapper" id="district-map-container">
                        <div id="back-to-districts"></div>
                        <svg id="district-map" viewBox="0 0 960 600">
                            <!-- US Congressional Districts Map SVG will be inserted here -->
                            <g id="districts">
                                <!-- District paths will be dynamically added -->
                            </g>
                        </svg>
                    </div>
                </div>

                <div class="info-panel">
                    <div id="district-info" class="district-info">
                        <div class="no-selection">
                            Select a district to view details
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tooltip -->
    <div id="tooltip"></div>

    <!-- Scripts -->
    <script src="main.js"></script>
    <script>
        // Theme Toggle Function
        function toggleTheme() {
            const body = document.body;
            const themeToggle = document.querySelector('.theme-toggle');
            
            if (body.classList.contains('dark')) {
                body.classList.remove('dark');
                body.classList.add('light');
                themeToggle.innerHTML = '<span class="theme-icon">🌙</span> Dark';
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('light');
                body.classList.add('dark');
                themeToggle.innerHTML = '<span class="theme-icon">☀️</span> Light';
                localStorage.setItem('theme', 'dark');
            }
        }

        // Check for saved theme preference
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.body.classList.remove('dark', 'light');
            document.body.classList.add(savedTheme);
            const themeToggle = document.querySelector('.theme-toggle');
            if (savedTheme === 'light') {
                themeToggle.innerHTML = '<span class="theme-icon">🌙</span> Dark';
            }
        }

        // Hamburger Menu Toggle
        const hamburger = document.querySelector('.hamburger');
        const navMenu = document.querySelector('.nav-menu');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        // Close mobile menu when clicking a link
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });

        // Map Toggle Functionality
        const toggleBtns = document.querySelectorAll('.toggle-btn');
        const mapViews = document.querySelectorAll('.map-view');

        toggleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const view = btn.dataset.view;
                
                // Update active button
                toggleBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Update active view
                mapViews.forEach(v => v.classList.remove('active'));
                document.getElementById(`${view}-view`).classList.add('active');
            });
        });
    </script>
</body>
</html>
